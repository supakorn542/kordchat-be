basePath: /api
definitions:
  dtos.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
      username:
        type: string
    required:
    - email
    - password
    - username
    type: object
host: localhost:8080
info:
  contact: {}
  description: API Server KordChat
  title: KordChat API
  version: "1.0"
paths:
  /register:
    post:
      consumes:
      - application/json
      description: request Username, Email, Password to create User
      parameters:
      - description: Register
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/dtos.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: register user successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: invalid data
          schema:
            additionalProperties: true
            type: object
      summary: User register
      tags:
      - Auth
swagger: "2.0"
